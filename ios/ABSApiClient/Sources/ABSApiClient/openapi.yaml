components:
  securitySchemes:
    BearerAuth:
      description: Bearer authentication
      type: http
      scheme: bearer
    RefreshToken:
      description: Refresh token sent via the x-refresh-token header (or refresh_token cookie).
      type: apiKey
      in: header
      name: x-refresh-token
  schemas:
    userId:
      type: string
      description: The ID of the user.
      format: uuid
      example: e4bb1afb-4a4f-4dd6-8be0-e615d233185b
    username:
      type: string
      description: The username of the user.
      example: root
    mediaProgressId:
      type: string
      description: The ID of the media progress. Will be the library item ID if the progress is for a book, or the library item ID and episode ID separated by a hyphen if it is for a podcast episode.
      example: e4bb1afb-4a4f-4dd6-8be0-e615d233185b
    libraryItemId:
      type: string
      description: The ID of library items after 2.3.0.
      format: uuid
      example: e4bb1afb-4a4f-4dd6-8be0-e615d233185b
    durationSec:
      description: The total length (in seconds) of the item or file.
      type: number
      example: 33854.905
    updatedAt:
      type: integer
      description: The time (in ms since POSIX epoch) when last updated.
      example: 1633522963509
    mediaProgress:
      type: object
      description: A user's progress for a single library item or podcast episode.
      properties:
        id:
          $ref: '#/components/schemas/mediaProgressId'
        userId:
          type: string
          description: The ID of the user the progress is for.
          format: uuid
          example: e4bb1afb-4a4f-4dd6-8be0-e615d233185b
        libraryItemId:
          $ref: '#/components/schemas/libraryItemId'
        episodeId:
          type: string
          nullable: true
          description: The ID of the podcast episode the progress is for. Will be null if the progress is for a book.
          example: e4bb1afb-4a4f-4dd6-8be0-e615d233185b
        duration:
          $ref: '#/components/schemas/durationSec'
        progress:
          type: number
          description: The percentage completion progress of the media item, between 0 and 1.
          example: 0.235
        currentTime:
          type: number
          description: The current time (in seconds) of progress.
          example: 1000
        isFinished:
          type: boolean
          description: Whether the media item is finished.
          example: false
        ebookLocation:
          type: string
          nullable: true
          description: The EBook progress location (CFI, page number, etc.). Will be null if the media item is not an ebook or has no ebook progress.
          example: epubcfi(/6/8[chapter-2]!/4/2/1612)
        ebookProgress:
          type: number
          nullable: true
          description: The percentage completion progress of the ebook, between 0 and 1.
          example: 0.02
        lastUpdate:
          $ref: '#/components/schemas/updatedAt'
        startedAt:
          type: integer
          description: The time (in ms since POSIX epoch) when the progress was created.
          example: 1633522963509
        finishedAt:
          type: integer
          nullable: true
          description: The time (in ms since POSIX epoch) when the media item was finished. Will be null if the media item has not been finished.
          example: 1633522963509
    userMinimal:
      type: object
      description: Minimal representation of the authenticated user. The `/api/me` endpoint returns a superset of these fields (permissions, settings, bookmarks, etc.); documented here are the fields most clients rely on.
      properties:
        id:
          $ref: '#/components/schemas/userId'
        username:
          $ref: '#/components/schemas/username'
        mediaProgress:
          type: array
          description: The user's media progress for library items and podcast episodes.
          items:
            $ref: '#/components/schemas/mediaProgress'
    authUser:
      type: object
      description: The authenticated user, extended with the session tokens returned by auth endpoints.
      allOf:
        - $ref: '#/components/schemas/userMinimal'
        - type: object
          properties:
            accessToken:
              type: string
              description: The bearer access token to use for subsequent authenticated requests.
              example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
            refreshToken:
              type: string
              nullable: true
              description: The refresh token, used to obtain a new access token. Null when the server returns it via cookie instead of the response body.
              example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
    mediaProgressUpdate:
      type: object
      description: Partial progress update. Any subset of these fields may be sent; the server merges them into the stored progress. Sending isFinished toggles the finished state.
      properties:
        currentTime:
          type: number
          description: The current time (in seconds) of progress.
          example: 1000
        duration:
          $ref: '#/components/schemas/durationSec'
        progress:
          type: number
          description: The percentage completion progress of the media item, between 0 and 1.
          example: 0.235
        isFinished:
          type: boolean
          description: Whether the media item is finished.
          example: false
        ebookLocation:
          type: string
          description: The EBook progress location (CFI, page number, etc.).
          example: epubcfi(/6/8[chapter-2]!/4/2/1612)
        ebookProgress:
          type: number
          description: The percentage completion progress of the ebook, between 0 and 1.
          example: 0.02
    deviceInfoRequest:
      type: object
      description: Device information sent by the client when starting or syncing a session. The server enriches this with request-derived fields (IP, user agent) to build the full deviceInfo.
      properties:
        deviceId:
          type: string
          description: A stable per-install identifier for the device.
          example: '158729'
        clientName:
          type: string
          description: The name of the client app (e.g. "Abs iOS", "Abs Android").
          example: Abs iOS
        clientVersion:
          type: string
          description: The version of the client app.
          example: 0.9.81
        manufacturer:
          type: string
          description: The manufacturer of the device.
          example: Apple
        model:
          type: string
          description: The model code of the device.
          example: iPhone15,2
        sdkVersion:
          type: string
          nullable: true
          description: The Android SDK version. Android only; null otherwise.
          example: '33'
    playbackSessionRequest:
      type: object
      description: Body used to start a playback session. `forceDirectPlay` and `forceTranscode` are the string "1" (enabled) or "" (disabled).
      properties:
        forceDirectPlay:
          type: string
          enum:
            - '1'
            - ''
          default: '1'
          description: Force direct play of the audio files.
        forceTranscode:
          type: string
          enum:
            - '1'
            - ''
          default: ''
          description: Force transcoding of the audio files.
        mediaPlayer:
          type: string
          description: The media player the client will use.
          example: AVPlayer
        deviceInfo:
          $ref: '#/components/schemas/deviceInfoRequest'
    playbackSessionId:
      type: string
      description: The ID of the playback session.
      example: play_c786zm3qtjz6bd5q3n
    libraryId:
      type: string
      description: The ID of the library.
      format: uuid
      example: e4bb1afb-4a4f-4dd6-8be0-e615d233185b
    mediaType:
      type: string
      description: The type of media, will be book or podcast.
      enum:
        - book
        - podcast
    bookChapter:
      type: object
      description: A book chapter. Includes the title and timestamps.
      properties:
        id:
          description: The ID of the book chapter.
          type: integer
          example: 0
        start:
          description: When in the book (in seconds) the chapter starts. Fractional seconds are common (e.g. 17.228).
          type: number
          example: 0
        end:
          description: When in the book (in seconds) the chapter ends.
          type: number
          example: 6004.6675
        title:
          description: The title of the chapter.
          type: string
          example: Wizards First Rule 01 Chapter 1
    playMethod:
      type: integer
      description: 'The method used to play the media: 0 for direct play, 1 for direct stream, 2 for transcode, 3 for local.'
      enum:
        - 0
        - 1
        - 2
        - 3
      example: 0
    deviceInfo:
      type: object
      description: The full device information stored with a playback session. Combines client-provided fields with server-derived fields (id, ipAddress, and user-agent-parsed browser/OS).
      properties:
        id:
          type: string
          format: uuid
          description: The server-generated ID of the device info record.
          example: e4bb1afb-4a4f-4dd6-8be0-e615d233185b
        userId:
          type: string
          format: uuid
          nullable: true
          description: The ID of the user the device belongs to.
          example: e4bb1afb-4a4f-4dd6-8be0-e615d233185b
        deviceId:
          type: string
          description: A stable per-install identifier for the device.
          example: '158729'
        ipAddress:
          type: string
          nullable: true
          description: The IP address the request originated from. (Server derived.)
          example: 192.168.1.118
        browserName:
          type: string
          nullable: true
          description: The browser name, parsed from the user agent. (Server derived.)
          example: Firefox
        browserVersion:
          type: string
          nullable: true
          description: The browser version, parsed from the user agent. (Server derived.)
          example: '106.0'
        osName:
          type: string
          nullable: true
          description: The OS name, parsed from the user agent. (Server derived.)
          example: Linux
        osVersion:
          type: string
          nullable: true
          description: The OS version, parsed from the user agent. (Server derived.)
          example: x86_64
        deviceType:
          type: string
          nullable: true
          description: The device type, parsed from the user agent. (Server derived.)
          example: mobile
        clientVersion:
          type: string
          nullable: true
          description: The version of the client app.
          example: 0.9.81
        manufacturer:
          type: string
          nullable: true
          description: The manufacturer of the device.
          example: Apple
        model:
          type: string
          nullable: true
          description: The model code of the device.
          example: iPhone15,2
        sdkVersion:
          type: string
          nullable: true
          description: The Android SDK version. Android only.
          example: '33'
        clientName:
          type: string
          nullable: true
          description: The name of the client app.
          example: Abs iOS
        deviceName:
          type: string
          nullable: true
          description: A human-readable device name derived by the server.
          example: Apple iPhone15,2
    size:
      description: The total size (in bytes) of the item or file.
      type: integer
      example: 268824228
    fileMetadata:
      type: object
      description: The metadata for a file, including the path, size, and unix timestamps of the file.
      nullable: true
      properties:
        filename:
          description: The filename of the file.
          type: string
          example: Wizards First Rule 01.mp3
        ext:
          description: The file extension of the file.
          type: string
          example: .mp3
        path:
          description: The absolute path on the server of the file.
          type: string
          example: /audiobooks/Terry Goodkind/Sword of Truth/Wizards First Rule/Terry Goodkind - SOT Bk01 - Wizards First Rule 01.mp3
        relPath:
          description: The path of the file, relative to the book's or podcast's folder.
          type: string
          example: Wizards First Rule 01.mp3
        size:
          $ref: '#/components/schemas/size'
        mtimeMs:
          description: The time (in ms since POSIX epoch) when the file was last modified on disk.
          type: integer
          example: 1632223180278
        ctimeMs:
          description: The time (in ms since POSIX epoch) when the file status was changed on disk.
          type: integer
          example: 1645978261001
        birthtimeMs:
          description: The time (in ms since POSIX epoch) when the file was created on disk. Will be 0 if unknown.
          type: integer
          example: 0
    AudioTrack:
      type: object
      description: Represents an audio track with various properties.
      properties:
        index:
          type: integer
          nullable: true
          description: The index of the audio track.
          example: null
        startOffset:
          type: number
          format: float
          nullable: true
          description: The start offset of the audio track in seconds.
          example: null
        duration:
          type: number
          format: float
          nullable: true
          description: The duration of the audio track in seconds.
          example: null
        title:
          type: string
          nullable: true
          description: The title of the audio track.
          example: null
        contentUrl:
          type: string
          nullable: true
          description: The URL where the audio track content is located.
          example: '`/api/items/${itemId}/file/${audioFile.ino}`'
        mimeType:
          type: string
          nullable: true
          description: The MIME type of the audio track.
          example: null
        codec:
          type: string
          nullable: true
          description: The codec used for the audio track.
          example: aac
        metadata:
          $ref: '#/components/schemas/fileMetadata'
    oldLibraryItemId:
      description: The ID of library items on server version 2.2.23 and before.
      type: string
      nullable: true
      format: li_[a-z0-9]{18}
      example: li_o78uaoeuh78h6aoeif
    inode:
      description: The inode of the item in the file system.
      type: string
      format: '[0-9]*'
      example: '649644248522215260'
    folderId:
      type: string
      description: The ID of the folder.
      format: uuid
      example: e4bb1afb-4a4f-4dd6-8be0-e615d233185b
    addedAt:
      type: integer
      description: The time (in ms since POSIX epoch) when added to the server.
      example: 1633522963509
    libraryItemBase:
      type: object
      description: Base library item schema
      properties:
        id:
          $ref: '#/components/schemas/libraryItemId'
        oldLibraryItemId:
          $ref: '#/components/schemas/oldLibraryItemId'
        ino:
          $ref: '#/components/schemas/inode'
        libraryId:
          $ref: '#/components/schemas/libraryId'
        folderId:
          $ref: '#/components/schemas/folderId'
        path:
          description: The path of the library item on the server.
          type: string
        relPath:
          description: The path, relative to the library folder, of the library item.
          type: string
        isFile:
          description: Whether the library item is a single file in the root of the library folder.
          type: boolean
        mtimeMs:
          description: The time (in ms since POSIX epoch) when the library item was last modified on disk.
          type: integer
        ctimeMs:
          description: The time (in ms since POSIX epoch) when the library item status was changed on disk.
          type: integer
        birthtimeMs:
          description: The time (in ms since POSIX epoch) when the library item was created on disk. Will be 0 if unknown.
          type: integer
        addedAt:
          $ref: '#/components/schemas/addedAt'
        updatedAt:
          $ref: '#/components/schemas/updatedAt'
        isMissing:
          description: Whether the library item was scanned and no longer exists.
          type: boolean
        isInvalid:
          description: Whether the library item was scanned and no longer has media files.
          type: boolean
        mediaType:
          $ref: '#/components/schemas/mediaType'
    bookMetadataBase:
      type: object
      description: The base book metadata object for minified, normal, and extended schemas to inherit from.
      properties:
        title:
          description: The title of the book. Will be null if unknown.
          type: string
          nullable: true
          example: Wizards First Rule
        subtitle:
          description: The subtitle of the book. Will be null if there is no subtitle.
          type: string
          nullable: true
        genres:
          description: The genres of the book.
          type: array
          items:
            type: string
          example:
            - Fantasy
            - Sci-Fi
            - 'Nonfiction: History'
        publishedYear:
          description: The year the book was published. Will be null if unknown.
          type: string
          nullable: true
          example: '2008'
        publishedDate:
          description: The date the book was published. Will be null if unknown.
          type: string
          nullable: true
        publisher:
          description: The publisher of the book. Will be null if unknown.
          type: string
          nullable: true
          example: Brilliance Audio
        description:
          description: A description for the book. Will be null if empty.
          type: string
          nullable: true
          example: The masterpiece that started Terry Goodkind's New York Times bestselling epic Sword of Truth In the aftermath of the brutal murder of his father, a mysterious woman, Kahlan Amnell, appears in Richard Cypher's forest sanctuary seeking help...and more. His world, his very beliefs, are shattered when ancient debts come due with thundering violence. In a dark age it takes courage to live, and more than mere courage to challenge those who hold dominion, Richard and Kahlan must take up that challenge or become the next victims. Beyond awaits a bewitching land where even the best of their hearts could betray them. Yet, Richard fears nothing so much as what secrets his sword might reveal about his own soul. Falling in love would destroy them - for reasons Richard can't imagine and Kahlan dare not say. In their darkest hour, hunted relentlessly, tormented by treachery and loss, Kahlan calls upon Richard to reach beyond his sword - to invoke within himself something more noble. Neither knows that the rules of battle have just changed...or that their time has run out. Wizard's First Rule is the beginning. One book. One Rule. Witness the birth of a legend.
        isbn:
          description: The ISBN of the book. Will be null if unknown.
          type: string
          nullable: true
        asin:
          description: The ASIN of the book. Will be null if unknown.
          type: string
          nullable: true
          example: B002V0QK4C
        language:
          description: The language of the book. Will be null if unknown.
          type: string
          nullable: true
        explicit:
          description: Whether the book has been marked as explicit.
          type: boolean
          example: false
    bookMetadataMinified:
      type: object
      description: The minified metadata for a book in the database.
      allOf:
        - $ref: '#/components/schemas/bookMetadataBase'
        - type: object
          properties:
            titleIgnorePrefix:
              description: The title of the book with any prefix moved to the end.
              type: string
            authorName:
              description: The name of the book's author(s).
              type: string
              example: Terry Goodkind
            authorNameLF:
              description: The name of the book's author(s) with last names first.
              type: string
              example: Goodkind, Terry
            narratorName:
              description: The name of the audiobook's narrator(s).
              type: string
              example: Sam Tsoutsouvas
            seriesName:
              description: The name of the book's series.
              type: string
              example: Sword of Truth
    bookCoverPath:
      description: The absolute path on the server of the cover file. Will be null if there is no cover.
      type: string
      nullable: true
      example: /audiobooks/Terry Goodkind/Sword of Truth/Wizards First Rule/cover.jpg
    tags:
      description: Tags applied to items.
      type: array
      items:
        type: string
      example:
        - To Be Read
        - 'Genre: Nonfiction'
    bookMinified:
      type: object
      description: Minified book schema. Does not depend on `bookBase` because there's pretty much no overlap.
      properties:
        metadata:
          $ref: '#/components/schemas/bookMetadataMinified'
        coverPath:
          $ref: '#/components/schemas/bookCoverPath'
        tags:
          $ref: '#/components/schemas/tags'
        numTracks:
          description: The number of tracks the book's audio files have.
          type: integer
          example: 1
        numAudioFiles:
          description: The number of audio files the book has.
          type: integer
          example: 1
        numChapters:
          description: The number of chapters the book has.
          type: integer
          example: 1
        numMissingParts:
          description: The total number of missing parts the book has.
          type: integer
          example: 0
        numInvalidAudioFiles:
          description: The number of invalid audio files the book has.
          type: integer
          example: 0
        duration:
          $ref: '#/components/schemas/durationSec'
        size:
          $ref: '#/components/schemas/size'
        ebookFormat:
          description: The format of ebook of the book. Will be null if the book is an audiobook.
          type: string
          nullable: true
    mediaMinified:
      description: The minified media of the library item.
      oneOf:
        - $ref: '#/components/schemas/bookMinified'
    libraryItemMinified:
      type: object
      description: A single item on the server, like a book or podcast. Minified media format.
      allOf:
        - $ref: '#/components/schemas/libraryItemBase'
        - type: object
          properties:
            media:
              $ref: '#/components/schemas/mediaMinified'
    playbackSession:
      type: object
      description: A playback session. Returned by the play endpoints and used as the request body when syncing an offline (locally recorded) session back to the server.
      properties:
        id:
          $ref: '#/components/schemas/playbackSessionId'
        userId:
          type: string
          nullable: true
          description: The ID of the user the playback session is for.
          format: uuid
          example: e4bb1afb-4a4f-4dd6-8be0-e615d233185b
        libraryId:
          $ref: '#/components/schemas/libraryId'
        libraryItemId:
          $ref: '#/components/schemas/libraryItemId'
        bookId:
          type: string
          nullable: true
          description: The ID of the book, if the media is a book. Null for podcasts.
          example: e4bb1afb-4a4f-4dd6-8be0-e615d233185b
        episodeId:
          type: string
          nullable: true
          description: The ID of the podcast episode, if the media is a podcast episode.
          example: e4bb1afb-4a4f-4dd6-8be0-e615d233185b
        mediaType:
          $ref: '#/components/schemas/mediaType'
        mediaMetadata:
          type: object
          description: The metadata of the media (book or podcast) associated with the session.
        chapters:
          type: array
          description: The chapters of the media, if it is a book.
          items:
            $ref: '#/components/schemas/bookChapter'
        displayTitle:
          type: string
          nullable: true
          description: The title of the media to display.
          example: Wizards First Rule
        displayAuthor:
          type: string
          nullable: true
          description: The author of the media to display.
          example: Terry Goodkind
        coverPath:
          type: string
          nullable: true
          description: The path of the media's cover on the server.
          example: /metadata/items/li_bufnnmp4y5o2gbbxfm/cover.jpg
        duration:
          $ref: '#/components/schemas/durationSec'
        playMethod:
          $ref: '#/components/schemas/playMethod'
        mediaPlayer:
          type: string
          description: The player used to play the media.
          example: AVPlayer
        deviceInfo:
          $ref: '#/components/schemas/deviceInfo'
        serverVersion:
          type: string
          description: The version of the server that created the session.
          example: 2.8.0
        date:
          type: string
          description: The date (in format YYYY-MM-DD) the session was started.
          example: '2022-11-11'
        dayOfWeek:
          type: string
          description: The day of the week the session was started.
          example: Friday
        startTime:
          type: number
          description: The media current time (in seconds) at the start of playback.
          example: 985.3
        coverAspectRatio:
          type: number
          nullable: true
          description: The aspect ratio of the item cover.
          example: 1
        startedAt:
          type: integer
          nullable: true
          description: The time (in ms since POSIX epoch) when the playback session was started.
          example: 1668206493239
        updatedAt:
          type: integer
          nullable: true
          description: The time (in ms since POSIX epoch) when the playback session was last updated.
          example: 1668206493239
        timeListening:
          type: number
          description: The total time (in seconds) listened to in the session.
          example: 240
        audioTracks:
          type: array
          description: The audio tracks played in the session.
          items:
            $ref: '#/components/schemas/AudioTrack'
        currentTime:
          type: number
          description: The current time (in seconds) of the playback position.
          example: 1000
        libraryItem:
          # Modeled as a freeform object on purpose: the client does not consume the session's
          # libraryItem (see PlaybackSessionMapping — it is mapped to nil), and the real play
          # response sends a richer/expanded item than libraryItemMinified, whose strict decode
          # would fail. Keeping it freeform avoids decode failures for a field we ignore.
          type: object
          nullable: true
          description: The library item associated with the session. Freeform; not consumed by this client.
    playbackReport:
      type: object
      description: A progress heartbeat used to sync an open playback session.
      required:
        - currentTime
        - duration
        - timeListened
      properties:
        currentTime:
          type: number
          description: The absolute playback position (in seconds).
          example: 1000
        duration:
          $ref: '#/components/schemas/durationSec'
        timeListened:
          type: number
          description: The number of seconds listened since the previous sync.
          example: 5
    localPlaybackSessionSyncAll:
      type: object
      description: Body used to bulk-sync offline playback sessions accumulated while disconnected.
      properties:
        sessions:
          type: array
          description: The offline playback sessions to sync.
          items:
            $ref: '#/components/schemas/playbackSession'
        deviceInfo:
          $ref: '#/components/schemas/deviceInfo'
    authorId:
      type: string
      description: The ID of the author.
      format: uuid
      example: e4bb1afb-4a4f-4dd6-8be0-e615d233185b
    authorAsin:
      description: The Audible identifier (ASIN) of the author. Will be null if unknown. Not the Amazon identifier.
      type: string
      nullable: true
      example: B000APZOQA
    authorName:
      description: The name of the author.
      type: string
      example: Terry Goodkind
    authorDescription:
      description: The new description of the author.
      type: string
      nullable: true
      example: Terry Goodkind is a
    authorImagePath:
      description: The absolute path for the author image. This will be in the `metadata/` directory. Will be null if there is no image.
      type: string
      nullable: true
      example: /metadata/authors/aut_z3leimgybl7uf3y4ab.jpg
    seriesId:
      type: string
      description: The ID of the series.
      format: uuid
      example: e4bb1afb-4a4f-4dd6-8be0-e615d233185b
    seriesName:
      description: The name of the series.
      type: string
      example: Sword of Truth
    authorSeries:
      type: object
      description: Series and the included library items that an author has written.
      properties:
        id:
          $ref: '#/components/schemas/seriesId'
        name:
          $ref: '#/components/schemas/seriesName'
        items:
          description: The items in the series. Each library item's media's metadata will have a `series` attribute, a `Series Sequence`, which is the matching series.
          type: array
          items:
            $ref: '#/components/schemas/libraryItemMinified'
    author:
      description: An author object which includes a description and image path. The library items and series associated with the author are optionally included.
      type: object
      properties:
        id:
          $ref: '#/components/schemas/authorId'
        asin:
          $ref: '#/components/schemas/authorAsin'
        name:
          $ref: '#/components/schemas/authorName'
        description:
          $ref: '#/components/schemas/authorDescription'
        imagePath:
          $ref: '#/components/schemas/authorImagePath'
        addedAt:
          $ref: '#/components/schemas/addedAt'
        updatedAt:
          $ref: '#/components/schemas/updatedAt'
        libraryItems:
          description: The items associated with the author
          type: array
          items:
            $ref: '#/components/schemas/libraryItemMinified'
        series:
          description: The series associated with the author
          type: array
          items:
            $ref: '#/components/schemas/authorSeries'
    authorUpdated:
      description: Whether the author was updated without errors. Will not exist if author was merged.
      type: boolean
      nullable: true
    authorMerged:
      description: Whether the author was merged with another author. Will not exist if author was updated.
      type: boolean
      nullable: true
    imageWidth:
      description: The requested width of image in pixels.
      type: integer
      default: 400
      example: 400
    imageHeight:
      description: The requested height of image in pixels. If `null`, the height is scaled to maintain aspect ratio based on the requested width.
      type: integer
      nullable: true
      default: null
      example: 600
    imageFormat:
      description: The requested output format.
      type: string
      default: jpeg
      example: webp
    imageRaw:
      description: Return the raw image without scaling if true.
      type: boolean
      default: false
    imageUrl:
      description: The URL of the image to add to the server
      type: string
      format: uri
      example: https://images-na.ssl-images-amazon.com/images/I/51NoQTm33OL.__01_SX120_CR0,0,120,120__.jpg
    authorSearchName:
      description: The name of the author to use for searching.
      type: string
      example: Terry Goodkind
    region:
      description: The region used to search.
      type: string
      example: us
      default: us
    ereaderName:
      type: string
      description: The name of the e-reader device.
    EreaderDeviceObject:
      type: object
      description: An e-reader device configured to receive EPUB through e-mail.
      properties:
        name:
          $ref: '#/components/schemas/ereaderName'
        email:
          type: string
          description: The email address associated with the e-reader device.
        availabilityOption:
          type: string
          description: The availability option for the device.
          enum:
            - adminOrUp
            - userOrUp
            - guestOrUp
            - specificUsers
        users:
          type: array
          description: List of specific users allowed to access the device.
          items:
            type: string
      required:
        - name
        - email
        - availabilityOption
    EmailSettings:
      type: object
      description: The email settings configuration for the server. This includes the credentials to send e-books and an array of e-reader devices.
      properties:
        id:
          type: string
          description: The unique identifier for the email settings. Currently this is always `email-settings`
          example: email-settings
        host:
          type: string
          description: The SMTP host address.
          nullable: true
        port:
          type: integer
          format: int32
          description: The port number for the SMTP server.
          example: 465
        secure:
          type: boolean
          description: Indicates if the connection should use SSL/TLS.
          example: true
        rejectUnauthorized:
          type: boolean
          description: Indicates if unauthorized SSL/TLS certificates should be rejected.
          example: true
        user:
          type: string
          description: The username for SMTP authentication.
          nullable: true
        pass:
          type: string
          description: The password for SMTP authentication.
          nullable: true
        testAddress:
          type: string
          description: The test email address used for sending test emails.
          nullable: true
        fromAddress:
          type: string
          description: The default "from" email address for outgoing emails.
          nullable: true
        ereaderDevices:
          type: array
          description: List of configured e-reader devices.
          items:
            $ref: '#/components/schemas/EreaderDeviceObject'
      required:
        - id
        - port
        - secure
        - ereaderDevices
    libraryName:
      description: The name of the library.
      type: string
      example: My Audiobooks
    folder:
      type: object
      description: Folder used in library
      properties:
        id:
          $ref: '#/components/schemas/folderId'
        fullPath:
          description: The path on the server for the folder. (Read Only)
          type: string
          example: /podcasts
        libraryId:
          $ref: '#/components/schemas/libraryId'
        addedAt:
          $ref: '#/components/schemas/addedAt'
    librarySettings:
      description: The settings for the library.
      type: object
      properties:
        coverAspectRatio:
          description: Whether the library should use square book covers. Must be 0 (for false) or 1 (for true).
          type: integer
          example: 1
        disableWatcher:
          description: Whether to disable the folder watcher for the library.
          type: boolean
          example: false
        skipMatchingMediaWithAsin:
          description: Whether to skip matching books that already have an ASIN.
          type: boolean
          example: false
        skipMatchingMediaWithIsbn:
          description: Whether to skip matching books that already have an ISBN.
          type: boolean
          example: false
        autoScanCronExpression:
          description: The cron expression for when to automatically scan the library folders. If null, automatic scanning will be disabled.
          type: string
          nullable: true
          example: 0 0 0 * * *
        audiobooksOnly:
          description: Whether the library should ignore ebook files and only allow ebook files to be supplementary.
          type: boolean
          example: false
        hideSingleBookSeries:
          description: Whether to hide series with only one book.
          type: boolean
          example: false
        onlyShowLaterBooksInContinueSeries:
          description: Whether to only show books in a series after the highest series sequence.
          type: boolean
          example: false
        metadataPrecedence:
          description: The precedence of metadata sources. See Metadata Providers for a list of possible providers.
          type: array
          items:
            type: string
          example:
            - folderStructure
            - audioMetatags
            - nfoFile
            - txtFiles
            - opfFile
            - absMetadata
        podcastSearchRegion:
          description: The region to use when searching for podcasts.
          type: string
          example: us
    createdAt:
      type: integer
      description: The time (in ms since POSIX epoch) when was created.
      example: 1633522963509
    library:
      description: A library object which includes either books or podcasts.
      type: object
      properties:
        id:
          $ref: '#/components/schemas/libraryId'
        name:
          $ref: '#/components/schemas/libraryName'
        folders:
          description: The folders that belong to the library.
          type: array
          items:
            $ref: '#/components/schemas/folder'
        displayOrder:
          description: Display position of the library in the list of libraries. Must be >= 1.
          type: integer
          example: 1
        icon:
          description: The selected icon for the library. See Library Icons for a list of possible icons.
          type: string
          example: audiobookshelf
        mediaType:
          description: The type of media that the library contains. Will be `book` or `podcast`. (Read Only)
          type: string
          example: book
        provider:
          description: Preferred metadata provider for the library. See Metadata Providers for a list of possible providers.
          type: string
          example: audible
        settings:
          $ref: '#/components/schemas/librarySettings'
        createdAt:
          $ref: '#/components/schemas/createdAt'
        lastUpdate:
          $ref: '#/components/schemas/updatedAt'
    libraryFolders:
      description: The folders of the library. Only specify the fullPath.
      type: array
      items:
        $ref: '#/components/schemas/folder'
    libraryDisplayOrder:
      description: The display order of the library. Must be >= 1.
      type: integer
      minimum: 1
      example: 1
    libraryIcon:
      description: The icon of the library. See Library Icons for a list of possible icons.
      type: string
      example: audiobookshelf
    libraryMediaType:
      description: The type of media that the library contains. Must be `book` or `podcast`.
      type: string
      example: book
    libraryProvider:
      description: Preferred metadata provider for the library. See Metadata Providers for a list of possible providers.
      type: string
      example: audible
    authorExpanded:
      type: object
      description: The author schema with the total number of books in the library.
      allOf:
        - $ref: '#/components/schemas/author'
        - type: object
          properties:
            numBooks:
              description: The number of books associated with the author in the library.
              type: integer
              example: 1
    total:
      description: The total number of items in the response.
      type: integer
      example: 100
    limit:
      description: The number of items to return. If 0, no items are returned.
      type: integer
      example: 10
      default: 0
    page:
      description: The page number (zero indexed) to return. If no limit is specified, then page will have no effect.
      type: integer
      example: 1
      default: 0
    sortBy:
      type: string
      description: The field to sort by from the request.
      example: media.metadata.title
    sortDesc:
      description: Whether to sort in descending order.
      type: boolean
      example: true
    filterBy:
      type: string
      description: The field to filter by from the request. TODO
      example: media.metadata.title
    minified:
      description: Return minified items if true.
      type: boolean
      example: true
      default: false
    collapseSeries:
      type: boolean
      description: Whether collapse series was set in the request.
      example: true
    libraryInclude:
      description: The fields to include in the response. The only current option is `rssfeed`.
      type: string
      example: rssfeed
    sequence:
      description: The position in the series the book is.
      type: string
      nullable: true
    libraryItemSequence:
      type: object
      description: A single item on the server, like a book or podcast. Includes series sequence information.
      allOf:
        - $ref: '#/components/schemas/libraryItemBase'
        - type: object
          properties:
            sequence:
              $ref: '#/components/schemas/sequence'
    seriesBooks:
      type: object
      description: A series object which includes the name and books in the series.
      properties:
        id:
          $ref: '#/components/schemas/seriesId'
        name:
          $ref: '#/components/schemas/seriesName'
        addedAt:
          $ref: '#/components/schemas/addedAt'
        nameIgnorePrefix:
          description: The name of the series with any prefix moved to the end.
          type: string
        nameIgnorePrefixSort:
          description: The name of the series with any prefix removed.
          type: string
        type:
          description: Will always be `series`.
          type: string
        books:
          description: The library items that contain the books in the series. A sequence attribute that denotes the position in the series the book is in, is tacked on.
          type: array
          items:
            $ref: '#/components/schemas/libraryItemSequence'
        totalDuration:
          description: The combined duration (in seconds) of all books in the series.
          type: number
    seriesDescription:
      description: A description for the series. Will be null if there is none.
      type: string
      nullable: true
      example: The Sword of Truth is a series of twenty one epic fantasy novels written by Terry Goodkind.
    series:
      type: object
      description: A series object which includes the name and description of the series.
      properties:
        id:
          $ref: '#/components/schemas/seriesId'
        name:
          $ref: '#/components/schemas/seriesName'
        description:
          $ref: '#/components/schemas/seriesDescription'
        addedAt:
          $ref: '#/components/schemas/addedAt'
        updatedAt:
          $ref: '#/components/schemas/updatedAt'
    seriesProgress:
      type: object
      description: The user's progress of a series.
      properties:
        libraryItemIds:
          description: The IDs of the library items in the series.
          type: array
          items:
            $ref: '#/components/schemas/libraryItemId'
        libraryItemIdsFinished:
          description: The IDs of the library items in the series that are finished.
          type: array
          items:
            $ref: '#/components/schemas/libraryItemId'
        isFinished:
          description: Whether the series is finished.
          type: boolean
    seriesWithProgressAndRSS:
      type: object
      description: A series object which includes the name and progress of the series.
      oneOf:
        - $ref: '#/components/schemas/series'
        - type: object
          properties:
            progress:
              $ref: '#/components/schemas/seriesProgress'
            rssFeed:
              description: The RSS feed for the series.
              type: string
              example: TBD
    NotificationEvent:
      type: object
      properties:
        name:
          type: string
          description: The name of the notification event. The names and allowable values are defined at https://github.com/advplyr/audiobookshelf/blob/master/server/utils/notifications.js
        requiresLibrary:
          type: boolean
          description: Whether the notification event depends on a library existing.
        libraryMediaType:
          type: string
          description: The type of media of the library the notification depends on existing. Will not exist if requiresLibrary is false.
          nullable: true
        description:
          type: string
          description: The description of the notification event.
        variables:
          type: array
          items:
            type: string
          description: The variables of the notification event that can be used in the notification templates.
        defaults:
          type: object
          properties:
            title:
              type: string
              description: The default title template for notifications using the notification event.
            body:
              type: string
              description: The default body template for notifications using the notification event.
        testData:
          type: object
          description: The keys of the testData object will match the list of variables. The values will be the data used when sending a test notification.
          additionalProperties:
            type: string
    notificationId:
      type: string
      description: The ID of the notification.
      example: notification-settings
    appriseApiUrl:
      type: string
      nullable: true
      description: The full URL where the Apprise API to use is located.
    libraryIdNullable:
      type: string
      description: The ID of the library. Applies to all libraries if `null`.
      format: uuid
      nullable: true
      example: e4bb1afb-4a4f-4dd6-8be0-e615d233185b
    notificationEventName:
      type: string
      description: The name of the event the notification will fire on.
      enum:
        - onPodcastEpisodeDownloaded
        - onBackupCompleted
        - onBackupFailed
        - onTest
    urls:
      type: array
      items:
        type: string
      description: The Apprise URLs to use for the notification.
      example: http://192.168.0.3:8000/notify/my-cool-notification
    titleTemplate:
      type: string
      description: The template for the notification title.
      example: New {{podcastTitle}} Episode!
    bodyTemplate:
      type: string
      description: The template for the notification body.
      example: '{{episodeTitle}} has been added to {{libraryName}} library.'
    enabled:
      type: boolean
      default: false
      description: Whether the notification is enabled.
    notificationType:
      type: string
      enum:
        - info
        - success
        - warning
        - failure
      nullable: true
      default: info
      description: The notification's type.
    Notification:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/notificationId'
        libraryId:
          $ref: '#/components/schemas/libraryIdNullable'
        eventName:
          $ref: '#/components/schemas/notificationEventName'
        urls:
          $ref: '#/components/schemas/urls'
        titleTemplate:
          $ref: '#/components/schemas/titleTemplate'
        bodyTemplate:
          $ref: '#/components/schemas/bodyTemplate'
        enabled:
          $ref: '#/components/schemas/enabled'
        type:
          $ref: '#/components/schemas/notificationType'
        lastFiredAt:
          type: integer
          nullable: true
          description: The time (in ms since POSIX epoch) when the notification was last fired. Will be null if the notification has not fired.
        lastAttemptFailed:
          type: boolean
          description: Whether the last notification attempt failed.
        numConsecutiveFailedAttempts:
          type: integer
          description: The number of consecutive times the notification has failed.
          default: 0
        numTimesFired:
          type: integer
          description: The number of times the notification has fired.
          default: 0
        createdAt:
          $ref: '#/components/schemas/createdAt'
    maxFailedAttempts:
      type: integer
      minimum: 0
      default: 5
      description: The maximum number of times a notification fails before being disabled.
    maxNotificationQueue:
      type: integer
      description: The maximum number of notifications in the notification queue before events are ignored.
    NotificationSettings:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/notificationId'
        appriseType:
          type: string
          description: The type of Apprise that will be used. At the moment, only api is available.
        appriseApiUrl:
          $ref: '#/components/schemas/appriseApiUrl'
        notifications:
          type: array
          items:
            $ref: '#/components/schemas/Notification'
          description: The set notifications.
        maxFailedAttempts:
          $ref: '#/components/schemas/maxFailedAttempts'
        maxNotificationQueue:
          $ref: '#/components/schemas/maxNotificationQueue'
        notificationDelay:
          type: integer
          description: The time (in ms) between notification pushes.
    podcastId:
      type: string
      description: The ID of podcasts and podcast episodes after 2.3.0.
      format: uuid
      example: e4bb1afb-4a4f-4dd6-8be0-e615d233185b
    PodcastMetadata:
      type: object
      description: Metadata for a podcast.
      properties:
        title:
          type: string
          description: The title of the podcast.
          nullable: true
        author:
          type: string
          description: The author of the podcast.
          nullable: true
        description:
          type: string
          description: The description of the podcast.
          nullable: true
        releaseDate:
          type: string
          format: date-time
          description: The release date of the podcast.
          nullable: true
        genres:
          type: array
          description: The genres of the podcast.
          items:
            type: string
        feedUrl:
          type: string
          description: The URL of the podcast feed.
          nullable: true
        imageUrl:
          type: string
          description: The URL of the podcast's image.
          nullable: true
        itunesPageUrl:
          type: string
          description: The URL of the podcast's iTunes page.
          nullable: true
        itunesId:
          type: string
          description: The iTunes ID of the podcast.
          nullable: true
        itunesArtistId:
          type: string
          description: The iTunes artist ID of the podcast.
          nullable: true
        explicit:
          type: boolean
          description: Whether the podcast contains explicit content.
        language:
          type: string
          description: The language of the podcast.
          nullable: true
        type:
          type: string
          description: The type of podcast (e.g., episodic, serial).
          nullable: true
    oldPodcastId:
      description: The ID of podcasts on server version 2.2.23 and before.
      type: string
      nullable: true
      format: pod_[a-z0-9]{18}
      example: pod_o78uaoeuh78h6aoeif
    audioMetaTags:
