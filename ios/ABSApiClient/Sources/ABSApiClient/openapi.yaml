openapi: 3.0.0
info:
  title: Audiobookshelf API
  version: 0.1.0
  description: Audiobookshelf API with autogenerated OpenAPI doc
servers:
  - url: http://localhost:3000
    description: Development server
security:
  - BearerAuth: []
tags:
  - name: Authentication
    description: Authentication endpoints
  - name: Me
    description: Endpoints for the authenticated user
  - name: Playback
    description: Playback session and progress endpoints
  - name: Authors
    description: Author endpoints
  - name: Libraries
    description: Library endpoints
  - name: Series
    description: Series endpoints
  - name: Email
    description: Email endpoints
  - name: Notification
    description: Notifications endpoints
  - name: Podcasts
    description: Podcast endpoints
paths:
  /auth/refresh:
    post:
      operationId: refreshToken
      tags:
        - Authentication
      summary: Refresh access token
      description: Exchange a refresh token for a new access token. The refresh token is provided either via the `x-refresh-token` header or the `refresh_token` cookie; the header takes precedence.
      security:
        - RefreshToken: []
      responses:
        '200':
          description: New tokens issued.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/authUser'
                  userDefaultLibraryId:
                    type: string
                    description: The ID of the user's default library.
                    example: e4bb1afb-4a4f-4dd6-8be0-e615d233185b
                  serverSettings:
                    type: object
                    description: The server settings (see the server settings object).
        '401':
          description: The refresh token is missing, invalid, or expired.
  /api/me:
    get:
      operationId: getCurrentUser
      tags:
        - Me
      summary: Get your user
      description: Get the authenticated user. The server returns a superset of the fields documented here.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/userMinimal'
        '401':
          $ref: '#/components/responses/unauthorized401'
  /api/me/progress/{libraryItemId}:
    parameters:
      - name: libraryItemId
        in: path
        description: The ID of the library item.
        required: true
        schema:
          $ref: '#/components/schemas/libraryItemId'
    get:
      operationId: getMediaProgress
      tags:
        - Me
      summary: Get media progress
      description: Get the authenticated user's media progress for a library item.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mediaProgress'
        '404':
          $ref: '#/components/responses/mediaProgress404'
    patch:
      operationId: updateMediaProgress
      tags:
        - Me
      summary: Create or update media progress
      description: Create or update the authenticated user's media progress for a library item.
      requestBody:
        required: true
        description: The progress fields to create or update.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/mediaProgressUpdate'
      responses:
        '200':
          description: The progress was created or updated.
        '401':
          $ref: '#/components/responses/unauthorized401'
  /api/me/progress/{libraryItemId}/{episodeId}:
    parameters:
      - name: libraryItemId
        in: path
        description: The ID of the library item.
        required: true
        schema:
          $ref: '#/components/schemas/libraryItemId'
      - name: episodeId
        in: path
        description: The ID of the podcast episode.
        required: true
        schema:
          type: string
          example: e4bb1afb-4a4f-4dd6-8be0-e615d233185b
    get:
      operationId: getPodcastEpisodeMediaProgress
      tags:
        - Me
      summary: Get podcast episode media progress
      description: Get the authenticated user's media progress for a podcast episode.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/mediaProgress'
        '404':
          $ref: '#/components/responses/mediaProgress404'
    patch:
      operationId: updatePodcastEpisodeMediaProgress
      tags:
        - Me
      summary: Create or update podcast episode media progress
      description: Create or update the authenticated user's media progress for a podcast episode.
      requestBody:
        required: true
        description: The progress fields to create or update.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/mediaProgressUpdate'
      responses:
        '200':
          description: The progress was created or updated.
        '401':
          $ref: '#/components/responses/unauthorized401'
  /api/items/{id}:
    get:
      operationId: getLibraryItem
      tags:
        - Library Items
      summary: Get a library item
      description: >
        Get a single library item. With `expanded=1` the full media (audioFiles, chapters,
        podcast episodes, ebook file, etc.) is returned; with `include=progress` the user's
        media progress is embedded as `userMediaProgress`. The full expanded item is large and
        already has a well-tested client-side model, so the response is documented here as a
        freeform object and decoded by the client into its own type.
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the library item.
          schema:
            $ref: '#/components/schemas/libraryItemId'
        - name: expanded
          in: query
          required: false
          description: When "1", returns the expanded library item (full media).
          schema:
            type: string
          example: '1'
        - name: include
          in: query
          required: false
          description: Comma-separated extra data to include (e.g. "progress").
          schema:
            type: string
          example: progress
        - name: episodeId
          in: query
          required: false
          description: When including progress for a podcast, the episode to get progress for.
          schema:
            type: string
      responses:
        '200':
          description: The library item (expanded and/or with progress, per the query parameters).
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/unauthorized401'
        '404':
          description: No library item with the given ID exists.
  /api/items/{id}/play:
    parameters:
      - name: id
        in: path
        description: The ID of the library item.
        required: true
        schema:
          $ref: '#/components/schemas/libraryItemId'
    post:
      operationId: playLibraryItem
      tags:
        - Playback
      summary: Play a library item
      description: Start a playback session for a library item (book or single-media item).
      requestBody:
        required: false
        description: Playback options and device information.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/playbackSessionRequest'
      responses:
        '200':
          description: The created playback session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/playbackSession'
        '401':
          $ref: '#/components/responses/unauthorized401'
  /api/items/{id}/play/{episodeId}:
    parameters:
      - name: id
        in: path
        description: The ID of the library item.
        required: true
        schema:
          $ref: '#/components/schemas/libraryItemId'
      - name: episodeId
        in: path
        description: The ID of the podcast episode to play.
        required: true
        schema:
          type: string
          example: e4bb1afb-4a4f-4dd6-8be0-e615d233185b
    post:
      operationId: playPodcastEpisode
      tags:
        - Playback
      summary: Play a podcast episode
      description: Start a playback session for a podcast episode.
      requestBody:
        required: false
        description: Playback options and device information.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/playbackSessionRequest'
      responses:
        '200':
          description: The created playback session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/playbackSession'
        '401':
          $ref: '#/components/responses/unauthorized401'
  /api/session/{id}/sync:
    parameters:
      - name: id
        in: path
        description: The ID of the playback session.
        required: true
        schema:
          $ref: '#/components/schemas/playbackSessionId'
    post:
      operationId: syncPlaybackSession
      tags:
        - Playback
      summary: Sync an open session
      description: Sync progress for an open playback session.
      requestBody:
        required: true
        description: The progress heartbeat.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/playbackReport'
      responses:
        '200':
          description: The session was synced.
        '404':
          $ref: '#/components/responses/session404'
  /api/session/local:
    post:
      operationId: syncLocalPlaybackSession
      tags:
        - Playback
      summary: Sync a local session
      description: Sync a single offline (locally recorded) playback session to the server.
      requestBody:
        required: true
        description: The offline playback session to sync.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/playbackSession'
      responses:
        '200':
          description: The local session was synced.
        '401':
          $ref: '#/components/responses/unauthorized401'
  /api/session/local-all:
    post:
      operationId: syncAllLocalPlaybackSessions
      tags:
        - Playback
      summary: Sync local sessions
      description: Bulk-sync offline playback sessions accumulated while disconnected.
      requestBody:
        required: true
        description: The offline playback sessions to sync.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/localPlaybackSessionSyncAll'
      responses:
        '200':
          description: The local sessions were synced.
        '401':
          $ref: '#/components/responses/unauthorized401'
  /api/authors/{id}:
    parameters:
      - name: id
        in: path
        description: Author ID
        required: true
        schema:
          $ref: '#/components/schemas/authorId'
    get:
      operationId: getAuthorById
      summary: Get an author by ID
      description: Get an author by ID. The author's books and series can be included in the response.
      tags:
        - Authors
      parameters:
        - in: query
          name: include
          description: A comma separated list of what to include with the author. The options are `items` and `series`. `series` will only have an effect if `items` is included. For example, the value `items,series` will include both library items and series.
          allowReserved: true
          schema:
            type: string
          example: items,series
      responses:
        '200':
          description: getAuthorById OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/author'
        '404':
          $ref: '#/components/responses/author404'
    patch:
      operationId: updateAuthorById
      summary: Update an author by ID
      description: Update an author by ID. The author's name and description can be updated. This endpoint will merge two authors if the new author name matches another author name in the database.
      tags:
        - Authors
      requestBody:
        description: The author object to update.
        content:
          application/json:
            schema:
              properties:
                name:
                  $ref: '#/components/schemas/authorName'
                description:
                  $ref: '#/components/schemas/authorDescription'
                imagePath:
                  $ref: '#/components/schemas/authorImagePath'
                asin:
                  $ref: '#/components/schemas/authorAsin'
      responses:
        '200':
          description: updateAuthorById OK
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/author'
                  - $ref: '#/components/schemas/authorUpdated'
                  - $ref: '#/components/schemas/authorMerged'
        '404':
          $ref: '#/components/responses/author404'
    delete:
      operationId: deleteAuthorById
      summary: Delete an author by ID
      description: Delete an author by ID. This will remove the author from all books.
      tags:
        - Authors
      responses:
        '200':
          description: deleteAuthorById OK
          content:
            text/plain:
              schema:
                type: string
                example: Author deleted.
        '404':
          $ref: '#/components/responses/author404'
  /api/authors/{id}/image:
    parameters:
      - name: id
        in: path
        description: Author ID
        required: true
        schema:
          $ref: '#/components/schemas/authorId'
      - name: token
        in: query
        description: API token
        schema:
          type: string
      - name: ts
        in: query
        description: Updated at value
        schema:
          type: integer
    get:
      operationId: getAuthorImageById
      summary: Get an author image by author ID
      description: Get an author image by author ID. The image will be returned in the requested format and size.
      security: []
      tags:
        - Authors
      requestBody:
        required: false
        description: The author image to get.
        content:
          application/json:
            schema:
              properties:
                width:
                  $ref: '#/components/schemas/imageWidth'
                height:
                  $ref: '#/components/schemas/imageHeight'
                format:
                  $ref: '#/components/schemas/imageFormat'
                raw:
                  $ref: '#/components/schemas/imageRaw'
      responses:
        '200':
          description: getAuthorImageById OK
          content:
            image/webp:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
            image/*:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/author404'
    post:
      operationId: addAuthorImageById
      summary: Add an author image to the server
      description: Add an author image to the server. The image will be downloaded from the provided URL and stored on the server.
      tags:
        - Authors
      requestBody:
        required: true
        description: The author image to add by URL.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/imageUrl'
      responses:
        '200':
          description: addAuthorImageById OK
          content:
            image/*:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/author404'
    patch:
      operationId: updateAuthorImageById
      summary: Update an author image by author ID
      description: Update an author image by author ID. The image will be resized if the width, height, or format is provided.
      tags:
        - Authors
      requestBody:
        description: The author image to update.
        content:
          application/json:
            schema:
              properties:
                width:
                  $ref: '#/components/schemas/imageWidth'
                height:
                  $ref: '#/components/schemas/imageHeight'
                format:
                  $ref: '#/components/schemas/imageFormat'
                raw:
                  $ref: '#/components/schemas/imageRaw'
      responses:
        '200':
          description: updateAuthorImageById OK
          content:
            image/*:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/author404'
    delete:
      operationId: deleteAuthorImageById
      summary: Delete an author image by author ID
      description: Delete an author image by author ID. This will remove the image from the server and the database.
      tags:
        - Authors
      responses:
        '200':
          description: deleteAuthorImageById OK
        '404':
          $ref: '#/components/responses/author404'
  /api/authors/{id}/match:
    parameters:
      - name: id
        in: path
        description: Author ID
        required: true
        schema:
          $ref: '#/components/schemas/authorId'
    post:
      operationId: matchAuthorById
      summary: Match the author against Audible using quick match
      description: Match the author against Audible using quick match. Quick match updates the author's description and image (if no image already existed) with information from audible. Either `asin` or `q` must be provided, with `asin` taking priority if both are provided.
      tags:
        - Authors
      requestBody:
        required: true
        description: The author object to match against an online provider.
        content:
          application/json:
            schema:
              type: object
              properties:
                q:
                  $ref: '#/components/schemas/authorSearchName'
                asin:
                  $ref: '#/components/schemas/authorAsin'
                region:
                  $ref: '#/components/schemas/region'
      responses:
        '200':
          description: matchAuthorById OK
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/author'
                  - $ref: '#/components/schemas/authorUpdated'
        '404':
          $ref: '#/components/responses/author404'
  /api/emails/settings:
    get:
      summary: Get email settings
      description: Get email settings for sending e-books to e-readers.
      operationId: getEmailSettings
      tags:
        - Email
      responses:
        '200':
          $ref: '#/components/responses/email200'
    patch:
      summary: Update email settings
      operationId: updateEmailSettings
      tags:
        - Email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailSettings'
      responses:
        '200':
          $ref: '#/components/responses/email200'
  /api/emails/test:
    post:
      summary: Send test email
      operationId: sendTestEmail
      tags:
        - Email
      responses:
        '200':
          description: Successful response
  /api/emails/ereader-devices:
    post:
      summary: Update e-reader devices
      operationId: updateEReaderDevices
      tags:
        - Email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ereaderDevices:
                  type: array
                  items:
                    $ref: '#/components/schemas/EreaderDeviceObject'
      responses:
        '200':
          $ref: '#/components/responses/ereader200'
        '400':
          description: Invalid payload
  /api/emails/send-ebook-to-device:
    post:
      summary: Send ebook to device
      operationId: sendEBookToDevice
      tags:
        - Email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                libraryItemId:
                  $ref: '#/components/schemas/libraryItemId'
                deviceName:
                  $ref: '#/components/schemas/ereaderName'
      responses:
        '200':
          description: Successful response
        '400':
          description: Invalid request
        '403':
          description: Forbidden
        '404':
          description: Not found
  /api/libraries:
    get:
      operationId: getLibraries
      summary: Get all libraries on server
      description: Get all libraries on server.
      tags:
        - Libraries
      responses:
        '200':
          description: getLibraries OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  libraries:
                    type: array
                    items:
                      $ref: '#/components/schemas/library'
    post:
      operationId: createLibrary
      summary: Create a new library on server
      description: Create a new library on server.
      tags:
        - Libraries
      requestBody:
        description: The library object to create.
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - folders
              properties:
                name:
                  $ref: '#/components/schemas/libraryName'
                folders:
                  $ref: '#/components/schemas/libraryFolders'
                displayOrder:
                  $ref: '#/components/schemas/libraryDisplayOrder'
                icon:
                  $ref: '#/components/schemas/libraryIcon'
                mediaType:
                  $ref: '#/components/schemas/libraryMediaType'
                provider:
                  $ref: '#/components/schemas/libraryProvider'
                settings:
                  $ref: '#/components/schemas/librarySettings'
      responses:
        '200':
          $ref: '#/components/responses/library200'
        '404':
          $ref: '#/components/responses/library404'
  /api/libraries/{id}:
    parameters:
      - name: id
        in: path
        description: The ID of the library.
        required: true
        schema:
          $ref: '#/components/schemas/libraryId'
    get:
      operationId: getLibraryById
      summary: Get a single library by ID on server
      description: Get a single library by ID on server.
      tags:
        - Libraries
      parameters:
        - in: query
          name: include
          schema:
            type: string
        - $ref: '#/components/parameters/minified'
      responses:
        '200':
          $ref: '#/components/responses/library200'
        '404':
          $ref: '#/components/responses/library404'
    patch:
      operationId: updateLibraryById
      summary: Update a single library by ID on server
      description: Update a single library by ID on server.
      tags:
        - Libraries
      requestBody:
        required: true
        description: The library object to update.
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: '#/components/schemas/libraryName'
                folders:
                  $ref: '#/components/schemas/libraryFolders'
                displayOrder:
                  $ref: '#/components/schemas/libraryDisplayOrder'
                icon:
                  $ref: '#/components/schemas/libraryIcon'
                mediaType:
                  $ref: '#/components/schemas/libraryMediaType'
                provider:
                  $ref: '#/components/schemas/libraryProvider'
                settings:
                  $ref: '#/components/schemas/librarySettings'
      responses:
        '200':
          $ref: '#/components/responses/library200'
        '404':
          $ref: '#/components/responses/library404'
    delete:
      operationId: deleteLibraryById
      summary: Delete a single library by ID on server
      description: Delete a single library by ID on server and return the deleted object.
      tags:
        - Libraries
      responses:
        '200':
          $ref: '#/components/responses/library200'
        '404':
          $ref: '#/components/responses/library404'
  /api/libraries/{id}/authors:
    parameters:
      - name: id
        in: path
        description: The ID of the library.
        required: true
        schema:
          $ref: '#/components/schemas/libraryId'
    get:
      operationId: getLibraryAuthors
      summary: Get all authors in a library
      description: Get all authors in a library by ID on server.
      tags:
        - Libraries
      responses:
        '200':
          description: getLibraryAuthors OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  authors:
                    type: array
                    items:
                      $ref: '#/components/schemas/authorExpanded'
        '404':
          $ref: '#/components/responses/library404'
  /api/libraries/{id}/items:
    parameters:
      - name: id
        in: path
        description: The ID of the library.
        required: true
        schema:
          $ref: '#/components/schemas/libraryId'
    get:
      operationId: getLibraryItems
      summary: Get items in a library
      description: Get items in a library by ID on server.
      tags:
        - Libraries
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/page'
        - in: query
          name: sort
          description: The field to sort by from the request.
          example: numBooks
          schema:
            type: string
            default: name
        - $ref: '#/components/parameters/desc'
        - in: query
          name: filter
          description: The filter for the library.
          example: media.metadata.title
          schema:
            type: string
        - in: query
          name: include
          description: The fields to include in the response. The only current option is `rssfeed`.
          allowReserved: true
          example: rssfeed
          schema:
            type: string
        - $ref: '#/components/parameters/minified'
        - in: query
          name: collapseSeries
          description: Whether to collapse series into a single cover
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: getLibraryItems OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/libraryItemBase'
                  total:
                    $ref: '#/components/schemas/total'
                  limit:
                    $ref: '#/components/schemas/limit'
                  page:
                    $ref: '#/components/schemas/page'
                  sortBy:
                    $ref: '#/components/schemas/sortBy'
                  sortDesc:
                    $ref: '#/components/schemas/sortDesc'
                  filterBy:
                    $ref: '#/components/schemas/filterBy'
                  mediaType:
                    $ref: '#/components/schemas/mediaType'
                  minified:
                    $ref: '#/components/schemas/minified'
                  collapseSeries:
                    $ref: '#/components/schemas/collapseSeries'
                  include:
                    $ref: '#/components/schemas/libraryInclude'
        '404':
          $ref: '#/components/responses/library404'
  /api/libraries/{id}/issues:
    parameters:
      - name: id
        in: path
        description: The ID of the library.
        required: true
        schema:
          $ref: '#/components/schemas/libraryId'
    delete:
      operationId: deleteLibraryIssues
      summary: Delete items with issues in a library.
      description: Delete all items with issues in a library by library ID on the server. This only removes the items from the ABS database and does not delete media files.
      tags:
        - Libraries
      responses:
        '200':
          description: deleteLibraryIssues OK
          content:
            application/json:
              schema:
                type: string
                example: Issues deleted.
        '404':
          $ref: '#/components/responses/library404'
  /api/libraries/{id}/series:
    parameters:
      - name: id
        in: path
        description: The ID of the library.
        required: true
        schema:
          $ref: '#/components/schemas/libraryId'
    get:
      operationId: getLibrarySeries
      summary: Get library series
      description: Get series in a library. Filtering and sorting can be applied.
      tags:
        - Libraries
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/page'
        - in: query
          name: sort
